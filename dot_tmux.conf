# Allow tmux to find tpm installed through brew on MacOS
if-shell "uname | grep -q Darwin" "set-environment -g PATH '/opt/homebrew/bin:/bin:/usr/bin'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Set Colors and Theme
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-termite:RGB'

set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_middle_separator " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_session_icon_bg "default"
set -g @catppuccin_status_session_text_bg "default"
set -g @catppuccin_status_session_icon_fg "default"
set -g @catppuccin_status_session_text_fg "default"
set -g @catppuccin_status_application_icon_bg "default"
set -g @catppuccin_status_application_text_bg "default"
set -g @catppuccin_status_application_icon_fg "default"
set -g @catppuccin_status_application_text_fg "default"
set -g @catppuccin_status_host_icon_bg "default"
set -g @catppuccin_status_host_text_bg "default"
set -g @catppuccin_status_host_icon_fg "default"
set -g @catppuccin_status_host_text_fg "default"
set -g @catppuccin_host_text " #{?#{==:#{pane_current_command},ssh},#{?#{==:#{pane_title},},#H,#{s/ .*//;s/.$//:pane_title}},#H}"
set -g @catppuccin_status_date_time_icon_bg "default"
set -g @catppuccin_status_date_time_text_bg "default"
set -g @catppuccin_status_date_time_icon_fg "#{@thm_blue}"
set -g @catppuccin_status_date_time_text_fg "default"
set -g @catppuccin_date_time_text " %Y-%m-%d %I:%M %p"

# Load Catppuccin before status modules are set.
run '~/.tmux/plugins/tmux/catppuccin.tmux'

set -g status-left-length 100
set -g status-right-length 100
set -g status-style "bg=default,fg=default"
set -g window-status-separator " "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bold,fg=#{@thm_blue},bg=default] #I:#W #[default]"
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Enable Mouse
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -s escape-time 0

# vim bindings for window movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Set vi-mode
setw -g mode-keys vi
set -s extended-keys on

# Set Source File
bind r source-file ~/.tmux.conf

set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{?#{==:#{pane_current_command},ssh},#{?#{==:#{pane_title},},#{b:pane_current_command},#{s/ .*//;s/.$//:pane_title}},#{b:pane_current_command}}"

# keybindings
bind Escape copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Set Paste
unbind p
bind p paste-buffer

set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# tmux plugin manager
run '~/.tmux/plugins/tpm/tpm'
if-shell "uname | grep -q Darwin" "run '/opt/homebrew/opt/tpm/share/tpm/tpm'"
